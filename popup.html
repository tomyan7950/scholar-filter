<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <header>
      <h1>Scholar Journal Filter</h1>
      <label class="toggle-row" id="enable-row">
        <span>Enabled</span>
        <input type="checkbox" id="toggle-enabled" checked>
        <span class="toggle-slider"></span>
      </label>
    </header>

    <div id="starter-banner" class="starter-banner" style="display:none;">
      <button class="banner-dismiss" id="dismiss-banner" title="Dismiss">&times;</button>
      <strong><span id="starter-count">48</span> journals loaded</strong> across 5 categories.
      <a href="#" id="customize-link">Customize in settings</a> to add, remove, or change categories.
    </div>

    <div class="stats-bar" id="stats-bar">
      <span id="stats-text">—</span>
    </div>

    <section class="controls">
      <div class="control-group">
        <label>Display Mode</label>
        <div class="button-group" id="display-mode">
          <button data-value="highlight" class="active">Highlight</button>
          <button data-value="dim">Dim</button>
          <button data-value="hide">Hide</button>
        </div>
      </div>

      <div class="control-group">
        <label>Filter Mode</label>
        <div class="button-group" id="filter-mode">
          <button data-value="whitelist" class="active">Whitelist</button>
          <button data-value="blacklist">Blacklist</button>
        </div>
      </div>

      <div class="control-group">
        <label>Non-Journal Items</label>
        <div class="button-group" id="non-journal">
          <button data-value="show" class="active">Show</button>
          <button data-value="dim">Dim</button>
          <button data-value="hide">Hide</button>
        </div>
      </div>

      <div class="control-group">
        <label>Highly Cited Badge</label>
        <div class="highly-cited-row">
          <label class="toggle-row toggle-row-sm">
            <input type="checkbox" id="toggle-highly-cited">
            <span class="toggle-slider toggle-slider-sm"></span>
          </label>
          <span class="threshold-label">Min citations:</span>
          <input type="number" id="highly-cited-threshold" min="1" max="99999" value="500" class="threshold-input">
        </div>
      </div>
    </section>

    <footer>
      <a href="#" id="options-link">Manage journal list</a>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
