<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Scholar Journal Filter — Settings</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <div class="options-container">
    <h1>Scholar Journal Filter</h1>
    <p class="subtitle">Manage your journal list</p>

    <div class="toolbar">
      <button id="add-journal" class="btn btn-primary">+ Add Journal</button>
      <div class="toolbar-right">
        <button id="reset-defaults-btn" class="btn btn-secondary">Reset to Defaults</button>
        <button id="delete-inactive-btn" class="btn btn-danger">Delete Inactive</button>
      </div>
    </div>


    <div class="search-bar">
      <input type="text" id="search-input" placeholder="Search journals...">
    </div>

    <table id="journal-table">
      <thead>
        <tr>
          <th class="col-active">Active</th>
          <th class="col-name">Journal Name</th>
          <th class="col-aliases">Aliases</th>
          <th class="col-actions">Actions</th>
        </tr>
      </thead>
      <tbody id="journal-tbody"></tbody>
    </table>

    <div id="empty-state" class="empty-state" style="display:none;">
      No journals in your list. Add some using the button above, or import a JSON file.
    </div>

    <div id="status-msg" class="status-msg" style="display:none;"></div>
  </div>

  <script src="defaults.js"></script>
  <script src="options.js"></script>
</body>
</html>
